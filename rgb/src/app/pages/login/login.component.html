@if (isLoading){
<app-loading [loadingText]="loadingText" ></app-loading>
} @else{
<h1>Login Page</h1>

<form [formGroup]="loginForm">

  <!-- STEP 1 -->
  @if (step === 'username'){
  <div>
    <h3>Enter Username</h3>

    <div>
      <input type="text" formControlName="userName" placeholder="Username" />

      @if (showError('userName')) {
      <span>{{ getErrorMessage('userName') }}</span>
      }

    </div>

    <button type="button" (click)="submitUsername()" [disabled]="loginForm.get('userName')?.invalid">
      Login
    </button>
  </div>
  }

  <!-- STEP 2 -->
  @if (step === 'otp'){
  <div>
    <h3>Enter OTP</h3>

    <input type="number" formControlName="otp" placeholder="OTP" />

    <button type="button" (click)="submitOtp()" [disabled]="loginForm.get('otp')?.invalid">
      Enter
    </button>
  </div>
  }

</form>
}
